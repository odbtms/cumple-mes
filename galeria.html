<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Galería </title>
<link rel="stylesheet" href="css/bootstrap.min.css" />
<link rel="stylesheet" href="css/amor.css" />
</head>
<body>
<div class="hearts-container" id="hearts"></div>
<header class="navbar navbar-expand-md fixed-top">
  <div class="container">
    <a href="index.html" class="navbar-brand brand-heart">Para valentina</a>
    <button class="navbar-toggler btn btn-sm btn-gradient" data-bs-toggle="collapse" data-bs-target="#navLove"><span class="navbar-toggler-icon"></span></button>
    <nav id="navLove" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="momentos.html">Momentos</a></li>
        <li class="nav-item"><a class="nav-link active text-white" href="galeria.html">Galería</a></li>
  <li class="nav-item"><a class="nav-link text-white-50" href="sobre.html">Carta</a></li>
      </ul>
    </nav>
  </div>
</header>
<main class="pt-5" style="margin-top:50px;">
  <section class="galeria py-5">
    <div class="container py-4">
      <span class="seccion-titulo">CHANCHEITOS</span>
      <h2 class="mb-4" style="font-weight:700;">HAMBURGUESITAS Y MAS</h2>
      <p class="text-white-50 mb-4" style="max-width:640px;">un poco de nuestros chancheos y cositas ricas o al menos de las que hay foto jajajaj, gracias amor porque cada que como algo junto a ti es mas rico</p>
      <div class="row g-4" id="galeriaFotos"></div>
    </div>
  </section>
</main>
<!-- Modal Lightbox -->
<div class="modal fade" id="lightbox" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content" style="background:#1a0d16; border:1px solid #442536;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="lightboxTitle" style="color:#ff9bb7;">Momento</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body pt-0">
        <img id="lightboxImg" src="" alt="Foto" class="img-fluid rounded-4" style="box-shadow:0 10px 30px -10px rgba(255,79,132,.5);" />
        <p id="lightboxCaption" class="mt-3 small text-white-50"></p>
      </div>
    </div>
  </div>
</div>
<footer class="py-4 text-center"><div class="container small">Hecho con ❤️ · <span id="anio"></span></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/imagenes.js"></script>
<script>
  document.getElementById('anio').textContent = new Date().getFullYear();
  const heartsContainer = document.getElementById('hearts');
  function spawnHeart(){const heart=document.createElement('div');heart.className='heart';heart.textContent=['❤','💖','💘','💕','💞'][Math.floor(Math.random()*5)];heart.style.left=Math.random()*100+'vw';heart.style.bottom='-40px';heart.style.fontSize=(12+Math.random()*26)+'px';heart.style.animationDuration=(5+Math.random()*4)+'s';heartsContainer.appendChild(heart);setTimeout(()=>heart.remove(),9000);} setInterval(spawnHeart,650);
  // Usar únicamente imágenes de la subcarpeta comida
  const fotos = IMAGENES_COMIDA;
  const titulos = generarTitulos('Bocado', IMAGENES_COMIDA);
  const galeria = document.getElementById('galeriaFotos');
  galeria.innerHTML = '';
  fotos.forEach((src,i)=> {
    const col = document.createElement('div');
    col.className = 'col-6 col-md-4 col-lg-3';
    col.innerHTML = `<div class="foto reveal delay-${(i%4)+1}" data-index="${i}"><img src="${src}" alt="${titulos[i]}" /></div>`;
    galeria.appendChild(col);
  });

  // Scroll reveal para fotos
  const revelar = () => { const vh = window.innerHeight * 0.9; document.querySelectorAll('.foto').forEach(f=>{ if(f.getBoundingClientRect().top < vh) f.classList.add('visible'); }); };
  window.addEventListener('scroll', revelar); window.addEventListener('load', revelar);

  // Lightbox
  const modal = new bootstrap.Modal(document.getElementById('lightbox'));
  const lbImg = document.getElementById('lightboxImg');
  const lbCap = document.getElementById('lightboxCaption');
  const lbTitle = document.getElementById('lightboxTitle');
  galeria.addEventListener('click', e => {
    const foto = e.target.closest('.foto');
    if(!foto) return;
    const idx = parseInt(foto.dataset.index,10);
    lbImg.src = fotos[idx];
    lbImg.alt = titulos[idx];
    lbCap.textContent = titulos[idx];
    lbTitle.textContent = 'Momento #' + (idx+1);
    modal.show();
  });
</script>
</body>
</html>
