<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Momentos 💖</title>
<link rel="stylesheet" href="css/bootstrap.min.css" />
<link rel="stylesheet" href="css/amor.css" />
</head>
<body>
<div class="hearts-container" id="hearts"></div>
<header class="navbar navbar-expand-md fixed-top">
  <div class="container">
  <a href="index.html" class="navbar-brand brand-heart">Para Valentina ❤</a>
    <button class="navbar-toggler btn btn-sm btn-gradient" data-bs-toggle="collapse" data-bs-target="#navLove">
      <span class="navbar-toggler-icon"></span>
    </button>
    <nav id="navLove" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link active text-white" href="momentos.html">Momentos</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="galeria.html">Galería</a></li>
  <li class="nav-item"><a class="nav-link text-white-50" href="sobre.html">Carta</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="pt-5" style="margin-top:50px;">
  <section class="momentos py-5">
    <div class="container py-4">
      <span class="seccion-titulo">LÍNEA DEL TIEMPO</span>
      <h2 class="mb-4" style="font-weight:700;">Nuestros Momentos</h2>
      <div class="row g-4" id="gridMomentos">
        <!-- Tarjetas de momentos -->
      </div>
    </div>
  </section>
  <!-- Collage de recuerdos -->
  <section class="py-4" style="background:#24111d;">
    <div class="container">
      <span class="seccion-titulo">RECUERDOS</span>
      <h3 class="mb-4" style="font-weight:600;">Fragmentos Contigo</h3>
      <div class="row g-3" id="collageRecuerdos"></div>
    </div>
  </section>
</main>

<!-- Modal para ver imagen de momento -->
<div class="modal fade" id="momentoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content" style="background:#1a0d16; border:1px solid #442536;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="momentoTitulo" style="color:#ff9bb7;">Momento</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body pt-0">
        <img id="momentoImg" src="" alt="Momento" class="img-fluid rounded-4" style="box-shadow:0 10px 30px -10px rgba(255,79,132,.5);" />
        <p id="momentoDesc" class="mt-3 small text-white-50"></p>
      </div>
    </div>
  </div>
</div>

<footer class="py-4 text-center"><div class="container small">Hecho con ❤️ · <span id="anio"></span></div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/imagenes.js"></script>
<script>
  document.getElementById('anio').textContent = new Date().getFullYear();
  const heartsContainer = document.getElementById('hearts');
  function spawnHeart(){ const heart=document.createElement('div'); heart.className='heart'; heart.textContent=['❤','💖','💘','💕','💞'][Math.floor(Math.random()*5)]; heart.style.left=Math.random()*100+'vw'; heart.style.bottom='-40px'; heart.style.fontSize=(12+Math.random()*26)+'px'; heart.style.animationDuration=(5+Math.random()*4)+'s'; heartsContainer.appendChild(heart); setTimeout(()=>heart.remove(),9000);} setInterval(spawnHeart,750);
  // Scroll reveal reutilizado
  const revelar=()=>{ const elementos=document.querySelectorAll('.momento-card, .img-collage'); const vh=window.innerHeight*.9; elementos.forEach((el,i)=>{ if(!el.classList.contains('reveal')) el.classList.add('reveal','delay-'+(i%4+1)); if(el.getBoundingClientRect().top<vh) el.classList.add('visible'); }); }; window.addEventListener('scroll',revelar); window.addEventListener('load',revelar);

  // Collage dinámico (muestra subset aleatorio de imágenes raíz)
  const collage = document.getElementById('collageRecuerdos');
  const seleccion = tomarAleatorias(12, IMAGENES_RAIZ);
  seleccion.forEach((src,i)=>{
     const col = document.createElement('div');
     col.className = 'col-4 col-md-3 col-lg-2';
     col.innerHTML = `<div class="ratio ratio-1x1 rounded-3 overflow-hidden img-collage" style="background:#35202c; border:1px solid #3d2230;">
         <img src="${src}" loading="lazy" alt="Recuerdo ${i+1}" style="object-fit:cover; width:100%; height:100%; filter:brightness(.92); transition:.5s;">
       </div>`;
     collage.appendChild(col);
  });
  collage.addEventListener('mouseover',e=>{ const img=e.target.closest('.img-collage img'); if(img) img.style.filter='brightness(1)'; });
  collage.addEventListener('mouseleave',e=>{ collage.querySelectorAll('img').forEach(img=> img.style.filter='brightness(.92)'); });

  // Lightbox de momentos
  const momentoModal = new bootstrap.Modal(document.getElementById('momentoModal'));
  const momentoImg = document.getElementById('momentoImg');
  const momentoTitulo = document.getElementById('momentoTitulo');
  const momentoDesc = document.getElementById('momentoDesc');
  // Datos de momentos (puedes editar textos luego)
  const MOMENTOS = [
    { img:'img/imagen24.jpeg', titulo:'Una foto muy nosotros', texto:'Creo que te dije que me encanto mucho esta foto siento que somos nosotros en esta foto me encanta siempre loquiando y sonriendo me ecanta compartir risas y chistes contigo  yase uno burlandose del otro o nosotros burlandonos de alguien ajjajajajajajaa' },
    { img:'img/imagen13.jpeg', titulo:'Salida familiar', texto:'esta fotito me encanta porque salimos todos juntos a comer como familia (se que no es "mi familia", pero me an incluido como uno mas y no tendria nada de eso si no fuera por ti mi amor hermosa), disfruto mucho cuando compartimos todos y gracias a ti todos esos momentos son mas lindos  ' },
    { img:'img/imagen12.jpeg', titulo:'Actvidad especial', texto:'Me encanto este dia ame mucho que nos pusieramos a colorear juntos y a rellenar toda la hojita , malo que leciamos coloriandonos a nosotros no recuerdo quien uso mas hojas jajajaja ' },
    { img:'img/imagen5.jpeg', titulo:'Te pedí pololeo', texto:'DEMORE pero llego estaba esperando a tener platita y poder pedirte ser mi novia como corresponde demore no por dudas si no que por preparacion porque no me cabia duda en que queria que fueras mi novia y que puedieramos y podamos seguir compartiendo nuestros dias ' },
    { img:'img/imagen4.jpeg', titulo:'Conoci a tu familia', texto:'este dia estaba super nerviosos conoci a tu familia por primera vez , tenia miedo al conocer a tus abuelos y a todos pero tu me diste toda la confianza que necesitaba , solo queria agradar y que supieran que yo te iba a cuidar y amar(me pase de confianza hasta baile bailalo rocky)' }
  ];
  const gridMomentos = document.getElementById('gridMomentos');
  MOMENTOS.forEach((m,i)=>{
    const col = document.createElement('div');
    col.className = 'col-6 col-md-4 col-lg-3';
    col.innerHTML = `
      <div class="momento-card reveal delay-${(i%4)+1}" data-img="${m.img}" data-texto="${m.texto.replace(/"/g,'&quot;')}" data-titulo="${m.titulo}">
        <div class="ratio ratio-1x1 rounded-4 overflow-hidden" style="background:#2f1826; border:1px solid #472434;">
          <img src="${m.img}" alt="${m.titulo}" style="width:100%;height:100%;object-fit:cover;filter:brightness(.92);transition:.5s;">
        </div>
        <h6 class="mt-2 mb-0" style="font-weight:600; color:#ff9bb7;">${m.titulo}</h6>
      </div>`;
    gridMomentos.appendChild(col);
  });
  gridMomentos.addEventListener('mouseover',e=>{ const card=e.target.closest('.momento-card'); if(card){ const img=card.querySelector('img'); img.style.filter='brightness(1)'; }});
  gridMomentos.addEventListener('mouseleave',()=> gridMomentos.querySelectorAll('img').forEach(img=> img.style.filter='brightness(.92)'));
  gridMomentos.addEventListener('click',e=>{
    const card = e.target.closest('.momento-card');
    if(!card) return;
    const img = card.dataset.img;
    const titulo = card.dataset.titulo;
    const texto = card.dataset.texto;
    momentoImg.src = img;
    momentoImg.alt = titulo;
    momentoTitulo.textContent = titulo;
    momentoDesc.textContent = texto;
    momentoModal.show();
  });
</script>
</body>
</html>
