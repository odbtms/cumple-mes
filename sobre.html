<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sobre 💌</title>
<link rel="stylesheet" href="css/bootstrap.min.css" />
<link rel="stylesheet" href="css/amor.css" />
<style>
  body{min-height:100vh;display:flex;flex-direction:column;}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;}
  .sobre-stage{position:relative;width:min(480px,92vw);max-width:480px;}
  .sobre-mini{position:relative; width:100%; aspect-ratio:4/3; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#ff9ec4,#ff5d95); border-radius:20px; box-shadow:0 22px 46px -18px rgba(255,79,132,.55),0 8px 26px -10px rgba(113,25,187,.35); overflow:hidden; cursor:pointer; perspective:1400px;}
  .tapa-sobre{position:absolute; inset:0; background:linear-gradient(140deg,#ff78b0,#ff2f78); clip-path:polygon(0 0,100% 0,50% 100%); transform-origin:top center; backface-visibility:hidden; transition:transform 1.05s cubic-bezier(.77,.05,.24,1);} 
  .sello{position:absolute; width:110px; height:110px; background:radial-gradient(circle at 30% 30%,#ffc7e1,#ff5d95 70%); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; font-family:'Segoe Script','Brush Script MT',cursive; color:#fff; letter-spacing:1px; box-shadow:0 6px 16px -6px rgba(0,0,0,.35),0 0 0 4px rgba(255,255,255,.35) inset; transition:transform .65s ease .2s, opacity .55s ease .25s;}
  .indicacion-abrir{position:absolute; bottom:12px; font-size:.9rem; font-weight:500; color:#fff; letter-spacing:1px; text-shadow:0 2px 8px rgba(0,0,0,.45); animation:parpadeo 1.4s ease-in-out infinite;}
  @keyframes parpadeo{0%,100%{opacity:.55;}50%{opacity:1;}}
  .sobre-mini.abriendo .tapa-sobre{transform:rotateX(180deg);} 
  .sobre-mini.abriendo .sello{transform:scale(0); opacity:0;} 
  .destello{position:absolute; inset:0; background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.7),rgba(255,255,255,0) 60%); mix-blend-mode:overlay; opacity:0; pointer-events:none; transition:opacity .8s ease .2s;}
  .sobre-mini.abriendo .destello{opacity:1;}
  .btn-abrir{margin-top:1.75rem; display:inline-flex; align-items:center; gap:.5rem; border:none; background:linear-gradient(135deg,#ff6fae,#ff2e77); color:#fff; font-weight:600; padding:.9rem 1.4rem; border-radius:50px; box-shadow:0 6px 18px -6px rgba(255,79,132,.55); cursor:pointer; position:relative; overflow:hidden;}
  .btn-abrir:before{content:""; position:absolute; inset:0; background:linear-gradient(90deg,rgba(255,255,255,.15),rgba(255,255,255,0)); transform:translateX(-60%); transition:transform .9s ease;}
  .btn-abrir:hover:before{transform:translateX(110%);} 
  .btn-abrir:active{transform:scale(.96);} 
  .msj{margin-top:1.1rem; font-size:.85rem; color:#cda9bb;}
  .logo-corner{position:fixed; top:10px; left:12px; font-size:.85rem; color:#ffb3d1; text-decoration:none; font-weight:600; letter-spacing:.5px;}
  @media (prefers-reduced-motion: reduce){
     .tapa-sobre,.sello,.destello,.btn-abrir:before{transition:none!important; animation:none!important;}
  }
</style>
</head>
<body>
<a href="index.html" class="logo-corner">❤ Inicio</a>
<main>
  <div class="sobre-stage text-center">
    <div class="sobre-mini" id="sobreAnim" role="button" tabindex="0" aria-label="Abrir carta">
      <div class="tapa-sobre"></div>
      <div class="sello">💘</div>
      <div class="destello"></div>
      <span class="indicacion-abrir">Haz clic para abrir</span>
    </div>
    <button class="btn-abrir" id="btnAbrir" aria-hidden="true" style="display:none;">Ver la carta <span>💌</span></button>
    <div class="msj" id="msjHint">Ábrelo y después podrás leer tu carta...</div>
  </div>
</main>
<footer class="py-4 text-center small" style="color:#ffb3d1;">Hecho con ❤️ · <span id="anio"></span></footer>
<script>
  document.getElementById('anio').textContent=new Date().getFullYear();
  const sobre = document.getElementById('sobreAnim');
  const btn = document.getElementById('btnAbrir');
  const hint = document.getElementById('msjHint');
  let abierto=false;
  function abrir(){
    if(abierto) return; abierto=true;
    sobre.classList.add('abriendo');
    setTimeout(()=>{ btn.style.display='inline-flex'; btn.focus(); hint.textContent='Ahora puedes abrir tu carta'; }, 1150);
    setTimeout(()=>{ hint.style.opacity='.6'; }, 3000);
  }
  sobre.addEventListener('click', abrir);
  sobre.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); abrir(); }});
  btn.addEventListener('click',()=>{ window.location.href='carta.html'; });
</script>
</body>
</html>
